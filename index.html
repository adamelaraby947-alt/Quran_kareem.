            padding: 15px 25px;
            background: #2b221b;

            display: flex;
            justify-content: space-around;
            color: #e9c27c;
            font-size: 1.2rem;
            border: 2px solid #b4945c;
            box-shadow: inset 0 0 10px #0f0b07;

        .loading-page {

            padding: 80px;
            font-size: 1.8rem;
            color: #e9c27c;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 2rem;
            color: #b4945c;
            padding: 60px;
            background: #1f1812;
            border-radius: 50px;
            border: 2px dashed #b4945c;

            flex-wrap: wrap;
            color: #e9c27c;
            font-size: 1.2rem;

            .mushaf-header h1 { font-size: 2.5rem; }

        // المتغيرات
        const grid = document.getElementById('surahGrid');
        const search = document.getElementById('searchInput');
        const viewer = document.getElementById('quranViewer');
        const pageTitle = document.getElementById('pageSurahName');
        const pageContent = document.getElementById('pageContent');
        const pageFooter = document.getElementById('pageFooterInfo');
        const saveBtn = document.getElementById('savePageBtn');
        
        // عناصر التحكم في حجم الخط
        const fontSizeSlider = document.getElementById('fontSizeSlider');
        const fontSizeValue = document.getElementById('fontSizeValue');
        
        let currentSurahId = null;
        let saved = JSON.parse(localStorage.getItem('savedSurahs')) || [];

        // وظيفة تغيير حجم الخط
        function updateFontSize(size) {
            const remSize = parseFloat(size).toFixed(1);
            
            // تطبيق الحجم على العناصر المهمة
            const ayahTexts = document.querySelectorAll('.ayah-text');
            const separators = document.querySelectorAll('.ayah-separator');
            
            ayahTexts.forEach(el => {
                el.style.fontSize = remSize + 'rem';
            });
            
            separators.forEach(el => {
                el.style.fontSize = (parseFloat(remSize) * 0.9) + 'rem';
            });
            
            // تحديث الرقم المعروض
            fontSizeValue.textContent = remSize + 'rem';
        }

        // حدث تغيير شريط التمرير
        fontSizeSlider.addEventListener('input', (e) => {
            updateFontSize(e.target.value);
        });

        // عرض السور
        function renderGrid(list) {
            if (!list.length) {
                grid.innerHTML = '<div class="no-results"><i class="fas fa-search"></i> ما لقينا شي</div>';
                return;
            }
            grid.innerHTML = list.map(s => `
                <div class="surah-card ${saved.includes(s.id) ? 'saved' : ''}" onclick="openSurah(${s.id})">
                    <div class="surah-number">${s.id}</div>
                    <div class="surah-name">${s.name}</div>
                    <div class="surah-name-en">${s.english}</div>
                    <div class="surah-detail">
                        <span><i class="fas fa-book"></i> ${s.verses}</span>
                        <span><i class="fas fa-${s.type === 'مكية' ? 'city' : 'mosque'}"></i> ${s.type}</span>
                    </div>
                    ${saved.includes(s.id) ? '<div class="save-mark"><i class="fas fa-check-circle"></i></div>' : ''}
                </div>
            `).join('');
        }

        // فلتر
        function filterSurahs(q) {
            if (!q) return surahs;
            const ql = q.trim().toLowerCase();
            return surahs.filter(s => s.name.includes(ql) || s.english.toLowerCase().includes(ql) || s.id.toString() === ql);
        }

        search.addEventListener('input', (e) => renderGrid(filterSurahs(e.target.value)));

        // فتح السورة
        window.openSurah = async function(id) {
            const s = surahs.find(s => s.id === id);
            if (!s) return;
            
            currentSurahId = id;
            pageTitle.innerHTML = `${s.name} <small>${s.english}</small>`;
            pageFooter.innerHTML = `
                <span><i class="fas fa-book"></i> ${s.verses} آية</span>
                <span><i class="fas fa-${s.type === 'مكية' ? 'city' : 'mosque'}"></i> ${s.type}</span>
                <span><i class="fas fa-list"></i> ترتيب ${s.id}</span>
            `;
            
            // تغيير شكل زر الحفظ
            saveBtn.innerHTML = saved.includes(id) ? '<i class="fas fa-check-circle"></i>' : '<i class="fas fa-bookmark"></i>';
            
            viewer.classList.add('active');
            document.body.style.overflow = 'hidden';
            
            // تحميل الآيات
            pageContent.innerHTML = '<div class="loading-page"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div>';
            
            try {
                const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
                const data = await res.json();
                
                if (data.code === 200 && data.data) {
                    let html = '';
                    data.data.ayahs.forEach((ayah, idx) => {
                        // عرض النص فقط
                        html += `<span class="ayah-text">${ayah.text}</span>`;
                        
                        // إضافة الفاصل الماسي بين الآيات (وليس بعد آخر آية)
                        if (idx < data.data.ayahs.length - 1) {
                            html += `<span class="ayah-separator"> ◇ </span>`;
                        }
                    });
                    pageContent.innerHTML = html;
                    
                    // بعد تحميل المحتوى، نطبق حجم الخط
                    setTimeout(() => {
                        updateFontSize(fontSizeSlider.value);
                    }, 100);
                } else {
                    pageContent.innerHTML = '<div class="loading-page">فشل التحميل</div>';
                }
            } catch (err) {
                pageContent.innerHTML = '<div class="loading-page">خطأ في الاتصال</div>';
            }
        };

        // حفظ السورة
        saveBtn.addEventListener('click', () => {
            if (!currentSurahId) return;
            
            const idx = saved.indexOf(currentSurahId);
            if (idx === -1) saved.push(currentSurahId);
            else saved.splice(idx, 1);
            
            localStorage.setItem('savedSurahs', JSON.stringify(saved));
            
            saveBtn.innerHTML = saved.includes(currentSurahId) ? '<i class="fas fa-check-circle"></i>' : '<i class="fas fa-bookmark"></i>';
            renderGrid(filterSurahs(search.value));
        });

        // إغلاق النافذة
        window.closeViewer = function() {
            viewer.classList.remove('active');
            document.body.style.overflow = 'auto';
        };

        // ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && viewer.classList.contains('active')) closeViewer();
        });

        // تحديث التاريخ
        function updateDate() {
            document.getElementById('hijriDisplay').innerHTML = `الخميس ١٤٤٦/٩/١٠ هـ`;
        }
        
        updateDate();
        renderGrid(surahs);
    })();

    <script>
let count = 0;
const azkar = ["سبحان الله", "الحمد لله", "الله أكبر", "أستغفر الله"];
let currentZekrIndex = 0;

function toggleSebha(s) { 
    document.getElementById('sebhaModal').style.display = s ? 'flex' : 'none'; 
}

function pressSebha() {
    count++;
    document.getElementById('sebha-count').innerText = count;

    if (count >= 30) {
        count = 0;
        currentZekrIndex = (currentZekrIndex + 1) % azkar.length;
        document.getElementById('sebha-zekr').innerText = azkar[currentZekrIndex];
        document.getElementById('sebha-count').innerText = "0";
        if (navigator.vibrate) navigator.vibrate(200);
    } else {
        if (navigator.vibrate) navigator.vibrate(50);
    }
}

function resetSebha() { 
    count = 0; 
    currentZekrIndex = 0;
    document.getElementById('sebha-count').innerText = "0"; 
    document.getElementById('sebha-zekr').innerText = azkar[0];
}
    </script>
